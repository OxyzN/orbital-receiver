<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Orbital (Cast Receiver)</title>

  <!-- Google Cast Application Framework (CAF) receiver -->
  <script type="text/javascript" src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>

  <style>
    /* Keep the exact theme tokens from Radio.html */
    :root {
      --bg-deep: #05010f;
      --bg-mid: #110427;
      --panel: rgba(9, 7, 30, 0.72);
      --panel-strong: rgba(7, 6, 24, 0.88);
      --line: rgba(120, 90, 255, 0.45);
      --cyan: #22e7ff;
      --blue: #4f8cff;
      --violet: #8d4dff;
      --pink: #ff4fd8;
      --magenta: #ff2da8;
      --white: #eef6ff;
      --soft: #b9c6ff;
      --glow-cyan: 0 0 10px rgba(34, 231, 255, 0.8), 0 0 24px rgba(34, 231, 255, 0.4);
      --glow-pink: 0 0 10px rgba(255, 79, 216, 0.8), 0 0 24px rgba(255, 79, 216, 0.4);
      --glow-violet: 0 0 10px rgba(141, 77, 255, 0.8), 0 0 24px rgba(141, 77, 255, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 58, 198, 0.18), transparent 16%),
        radial-gradient(circle at 82% 18%, rgba(34, 231, 255, 0.12), transparent 18%),
        radial-gradient(circle at 50% 120%, rgba(141, 77, 255, 0.24), transparent 40%),
        linear-gradient(180deg, #090217 0%, #04010c 100%);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding:
        max(env(safe-area-inset-top), 12px)
        max(env(safe-area-inset-right), 12px)
        max(env(safe-area-inset-bottom), 12px)
        max(env(safe-area-inset-left), 12px);
    }

    .panel {
      width: min(980px, 92vw);
      padding: 28px;
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 0 1px rgba(34, 231, 255, 0.10), 0 12px 55px rgba(0,0,0,0.55);
      backdrop-filter: blur(18px);
      will-change: transform;
    }

    .header {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .title {
      margin: 0;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 18px;
      color: var(--soft);
    }

    .name {
      margin: 0;
      font-size: 34px;
      line-height: 1.1;
      text-shadow: var(--glow-violet);
    }

    .name .radio { color: var(--cyan); text-shadow: var(--glow-cyan); }
    .name .orbital { color: var(--pink); text-shadow: var(--glow-pink); }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(7, 6, 24, 0.62);
      color: var(--white);
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: var(--glow-cyan);
      animation: pulse 1.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.85); opacity: 0.65; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: stretch;
    }

    .card {
      border-radius: 18px;
      background: var(--panel-strong);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 18px;
      min-height: 180px;
    }

    .card h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
      letter-spacing: 0.04em;
      color: var(--soft);
      text-transform: uppercase;
    }

    .card p {
      margin: 0 0 14px 0;
      color: rgba(238, 246, 255, 0.86);
      line-height: 1.45;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(7, 6, 24, 0.62);
      color: var(--white);
      padding: 12px 16px;
      border-radius: 14px;
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
      user-select: none;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn.play {
      border-color: rgba(34,231,255,0.55);
      box-shadow: 0 0 0 1px rgba(34,231,255,0.10), var(--glow-cyan);
      color: var(--cyan);
    }

    .btn.stop {
      border-color: rgba(255,79,216,0.55);
      box-shadow: 0 0 0 1px rgba(255,79,216,0.10), var(--glow-pink);
      color: var(--pink);
    }

    .footer {
      padding-top: 16px;
      margin-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.08);
      color: rgba(185, 198, 255, 0.85);
      display: flex;
      justify-content: space-between;
      gap: 14px;
      font-weight: 600;
    }

    @media (max-width: 820px) {
      .body { grid-template-columns: 1fr; }
      .name { font-size: 30px; }
    }

    /* Nest Hub-style layouts are often wide but not tall */
    @media (max-height: 520px) {
      .panel { padding: 18px; }
      .header { margin-bottom: 12px; padding-bottom: 12px; }
      .name { font-size: 28px; }
      .card { min-height: 0; padding: 14px; }
      .body { gap: 12px; }
      .footer { margin-top: 12px; padding-top: 12px; }
    }
  </style>
</head>
<body>
  <main class="panel">
    <header class="header">
      <div class="brand">
        <div class="title">Dance Electronic Music</div>
        <h1 class="name"><span class="radio">Radio</span> <span class="orbital">Orbital</span></h1>
      </div>
      <div class="status" id="castStatus">
        <span class="dot" aria-hidden="true"></span>
        <span id="castStatusText">Waiting for sender…</span>
      </div>
    </header>

    <section class="body">
      <section class="card">
        <h2>Now Playing</h2>
        <p id="nowPlaying">Live stream from Lisbon.</p>
        <div class="controls">
          <button class="btn play" id="playBtn" type="button">Play</button>
          <button class="btn stop" id="stopBtn" type="button">Stop</button>
        </div>
      </section>

      <section class="card">
        <h2>Tip</h2>
        <p>
          This is a custom Google Cast receiver, so this HTML UI renders directly on the Nest Hub.
          Use the Android app’s Cast button to connect and start playback.
        </p>
        <p id="debugLine" style="opacity:.8"></p>
      </section>
    </section>

    <footer class="footer">
      <span id="statusText">Ready</span>
      <span>Orbital Receiver</span>
    </footer>

    <!-- Required by CAF v3: framework routes all audio/video through this element on Nest Hub -->
    <cast-media-player></cast-media-player>

    <!-- Fallback audio element used when CAF is absent (e.g. laptop browser preview) -->
    <audio id="radio" preload="none" playsinline></audio>
  </main>

  <script src="./receiver.js"></script>
</body>
</html>
